<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>CTRL — Pipeline</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Orbitron:wght@600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"><style>
:root {--bg-0:#060b14;--bg-1:#0a1220;--bg-2:#101a2b;--panel:rgba(14,23,37,.78);--panel-solid:#0f1a2b;--text:#c7d8ef;--text-soft:#8ea8cc;--heading:#eaf6ff;--cyan:#4cf4ff;--cyan-soft:rgba(76,244,255,.34);--magenta:#ff4edb;--green:#4effb4;--yellow:#ffe066;--red:#ff6b6b;--border:rgba(120,205,255,.25);--glow:0 0 0 1px var(--cyan-soft),0 0 24px rgba(76,244,255,.15);--sidebar-w:62px;--feed-w:272px;--radius:14px;}*{box-sizing:border-box}body{margin:0;color:var(--text);font-family:Outfit,sans-serif;background:radial-gradient(circle at 20% 0%,rgba(76,244,255,.08),transparent 35%),radial-gradient(circle at 90% 80%,rgba(255,78,219,.08),transparent 30%),linear-gradient(160deg,var(--bg-0),var(--bg-1) 45%,var(--bg-2));min-height:100vh}.nav{width:var(--sidebar-w);position:fixed;inset:0 auto 0 0;z-index:20;border-right:1px solid var(--border);background:rgba(6,11,20,.85);display:flex;flex-direction:column;align-items:center;gap:14px;padding:14px 8px}.logo{font-family:Orbitron,sans-serif;color:var(--cyan)}.nav a{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;color:var(--text-soft);text-decoration:none;border:1px solid transparent;font-size:18px}.nav a:hover,.nav a.active{color:var(--heading);border-color:var(--cyan-soft);box-shadow:var(--glow);background:rgba(76,244,255,.08)}main{margin-left:var(--sidebar-w);padding:24px}.title{font-family:Orbitron,sans-serif;color:var(--heading)}.board{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}.col{background:rgba(8,16,28,.8);border:1px dashed rgba(130,200,255,.3);border-radius:10px;padding:10px;min-height:320px}.card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:8px;margin:8px 0;cursor:grab}.card textarea{width:100%;min-height:120px;background:#091422;color:var(--text);border:1px solid var(--border)}button{background:rgba(76,244,255,.1);color:var(--heading);border:1px solid var(--cyan-soft);border-radius:8px;padding:5px 8px;cursor:pointer}.repurpose{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px}.modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;place-items:center}.modal.open{display:grid}.modal > div{background:#0d1727;border:1px solid var(--border);padding:14px;border-radius:10px}
</style></head><body>
<nav class="nav"><div class="logo">C</div><a href="/ctrl/ai-dashboard.html" title="Overview">⌂</a><a href="/ctrl/research.html" title="Research">⌕</a><a class="active" href="/ctrl/pipeline.html" title="Pipeline">▤</a><a href="/ctrl/performance.html" title="Performance">◔</a><a href="/ctrl/agents.html" title="Agents">⚙</a><a href="/ctrl/clients.html" title="Clients">☰</a></nav>
<main><h1 class="title">CTRL // Pipeline</h1><div class="board" id="board"></div>
<div class="repurpose"><div class="card">Repurpose: turn top Reel into YouTube short</div><div class="card">Repurpose: carousel to script thread</div><div class="card">Repurpose: longform to 3 clips</div></div></main>
<div class="modal" id="scheduleModal"><div><h3 class="title" style="font-size:16px">Set Scheduled Time</h3><input id="scheduleTime" type="datetime-local"><br><br><button id="saveSchedule">Save</button></div></div>
<script>
const columns=['Ideas','Scripting','Editing','Scheduled','Published'];
let pendingSchedule=null;
let state=JSON.parse(localStorage.getItem('ctrl_pipeline_board')||'null')||{
  Ideas:[{id:crypto.randomUUID(),title:'Neural Habit Stack'}],Scripting:[{id:crypto.randomUUID(),title:'Motivation Myth Bust'}],Editing:[{id:crypto.randomUUID(),title:'Dopamine Detox #4'}],Scheduled:[],Published:[{id:crypto.randomUUID(),title:'Flow Trigger Protocol'}]
};
function persist(){localStorage.setItem('ctrl_pipeline_board',JSON.stringify(state));}
function integrateIdeas(){const incoming=JSON.parse(localStorage.getItem('ctrl_pipeline_ideas')||'[]');if(!incoming.length)return;incoming.forEach(i=>state.Ideas.unshift({id:crypto.randomUUID(),title:i.title||i}));localStorage.removeItem('ctrl_pipeline_ideas');persist();}
function cardHtml(card,col){return `<div class="card" draggable="true" data-id="${card.id}" data-col="${col}"><div><b>${card.title}</b></div>${col==='Ideas'?'<button class="scriptBtn">→ Script</button>':''}${card.script?'<button class="openScript">Open Script</button>':''}${card.script?`<div style="font-size:12px;color:#8ea8cc">Script saved</div>`:''}</div>`;}
function render(){const b=document.getElementById('board');b.innerHTML=columns.map(c=>`<div class="col" data-col="${c}"><h3 class="title" style="font-size:14px">${c}</h3>${state[c].map(x=>cardHtml(x,c)).join('')}</div>`).join('');bindDnD();persist();}
function bindDnD(){document.querySelectorAll('.card').forEach(card=>card.addEventListener('dragstart',e=>e.dataTransfer.setData('text/plain',JSON.stringify({id:card.dataset.id,from:card.dataset.col}))));document.querySelectorAll('.col').forEach(col=>{col.addEventListener('dragover',e=>e.preventDefault());col.addEventListener('drop',e=>{e.preventDefault();const data=JSON.parse(e.dataTransfer.getData('text/plain'));moveCard(data.from,col.dataset.col,data.id);});});}
function moveCard(from,to,id){const idx=state[from].findIndex(x=>x.id===id);if(idx<0)return;const [card]=state[from].splice(idx,1);if(to==='Scheduled'){pendingSchedule={from,to,card};document.getElementById('scheduleModal').classList.add('open');return;}state[to].unshift(card);render();}
document.getElementById('saveSchedule').onclick=()=>{if(!pendingSchedule)return;pendingSchedule.card.scheduleAt=document.getElementById('scheduleTime').value||new Date().toISOString();state[pendingSchedule.to].unshift(pendingSchedule.card);pendingSchedule=null;document.getElementById('scheduleModal').classList.remove('open');render();};
async function generateScript(title){const res=await fetch('/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({system:'You are an elite social scriptwriter for CTRL.',prompt:`Generate a short social video script for: ${title}`})});if(!res.ok) throw new Error('generate failed');return (await res.json()).script;}
document.body.addEventListener('click',async e=>{const cardEl=e.target.closest('.card');if(!cardEl)return;const col=cardEl.dataset.col;const id=cardEl.dataset.id;const card=state[col].find(x=>x.id===id);if(e.target.classList.contains('scriptBtn')){e.target.textContent='GENERATING SCRIPT...';try{const text=await generateScript(card.title);card.script=text;const ta=document.createElement('textarea');ta.value=text;const save=document.createElement('button');save.textContent='Save Script';save.onclick=()=>{card.script=ta.value;moveCard('Ideas','Scripting',id);};cardEl.append(ta,save);}catch{alert('Could not generate script. Start proxy with node proxy.js and open via localhost:3001.');}finally{e.target.textContent='→ Script';persist();}}
if(e.target.classList.contains('openScript')){alert(card.script||'No script');}});
integrateIdeas();render();
</script></body></html>
