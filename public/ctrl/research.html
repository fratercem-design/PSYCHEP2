<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>CTRL — Research</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Orbitron:wght@600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"><style>
:root {--bg-0:#060b14;--bg-1:#0a1220;--bg-2:#101a2b;--panel:rgba(14,23,37,.78);--panel-solid:#0f1a2b;--text:#c7d8ef;--text-soft:#8ea8cc;--heading:#eaf6ff;--cyan:#4cf4ff;--cyan-soft:rgba(76,244,255,.34);--magenta:#ff4edb;--green:#4effb4;--yellow:#ffe066;--red:#ff6b6b;--border:rgba(120,205,255,.25);--glow:0 0 0 1px var(--cyan-soft),0 0 24px rgba(76,244,255,.15);--sidebar-w:62px;--feed-w:272px;--radius:14px;}*{box-sizing:border-box}body{margin:0;color:var(--text);font-family:Outfit,sans-serif;background:radial-gradient(circle at 20% 0%,rgba(76,244,255,.08),transparent 35%),radial-gradient(circle at 90% 80%,rgba(255,78,219,.08),transparent 30%),linear-gradient(160deg,var(--bg-0),var(--bg-1) 45%,var(--bg-2));min-height:100vh}body:before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(100,220,255,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(100,220,255,.06) 1px,transparent 1px);background-size:44px 44px;opacity:.3;z-index:-1}.nav{width:var(--sidebar-w);position:fixed;inset:0 auto 0 0;z-index:20;border-right:1px solid var(--border);background:rgba(6,11,20,.85);backdrop-filter:blur(8px);display:flex;flex-direction:column;align-items:center;gap:14px;padding:14px 8px}.logo{font-family:Orbitron,sans-serif;color:var(--cyan);font-size:18px;margin-bottom:8px}.nav a{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;color:var(--text-soft);text-decoration:none;border:1px solid transparent;font-size:18px}.nav a:hover,.nav a.active{color:var(--heading);border-color:var(--cyan-soft);box-shadow:var(--glow);background:rgba(76,244,255,.08)}main{margin-left:var(--sidebar-w);padding:24px}.card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--glow);padding:14px;margin-bottom:16px}.title{font-family:Orbitron,sans-serif;color:var(--heading)}table{width:100%;border-collapse:collapse}th,td{padding:8px;border-bottom:1px solid rgba(130,200,255,.15)}button{background:rgba(76,244,255,.1);color:var(--heading);border:1px solid var(--cyan-soft);border-radius:8px;padding:6px 8px;cursor:pointer}.grid{display:grid;grid-template-columns:2fr 1fr;gap:12px}.pulse,.hooks{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.mono{font-family:"JetBrains Mono",monospace}.bank{background:rgba(8,16,28,.8);border:1px dashed rgba(130,200,255,.3);padding:10px;border-radius:10px;min-height:120px}
</style></head><body>
<nav class="nav"><div class="logo">C</div><a href="/ctrl/ai-dashboard.html" title="Overview">⌂</a><a class="active" href="/ctrl/research.html" title="Research">⌕</a><a href="/ctrl/pipeline.html" title="Pipeline">▤</a><a href="/ctrl/performance.html" title="Performance">◔</a><a href="/ctrl/agents.html" title="Agents">⚙</a><a href="/ctrl/clients.html" title="Clients">☰</a></nav>
<main><h1 class="title">CTRL // Research</h1>
<div class="grid"><div>
<div class="card"><h3 class="title" style="font-size:16px">Trending Topics</h3><table><thead><tr><th>Topic</th><th>Hook Angle</th><th>Platform</th><th>Potential</th><th></th></tr></thead><tbody id="topicRows"></tbody></table></div>
<div class="card"><h3 class="title" style="font-size:16px">Hook Formula Library</h3><div class="hooks" id="hookLib"></div></div>
<div class="card"><h3 class="title" style="font-size:16px">Quick Capture</h3><textarea id="quickCapture" style="width:100%;height:84px;background:#071221;color:var(--text);border:1px solid var(--border);border-radius:8px"></textarea><button id="saveCapture">Save to Idea Bank</button></div>
</div><div>
<div class="card"><h3 class="title" style="font-size:16px">Competitor Pulse</h3><div class="pulse"><div class="bank">MindLab<br><span class="mono">+18% views</span></div><div class="bank">NuroX<br><span class="mono">+9% saves</span></div><div class="bank">SynthCoach<br><span class="mono">+3.2% ER</span></div></div></div>
<div class="card"><h3 class="title" style="font-size:16px">Idea Bank</h3><div id="ideaBank" class="bank"></div></div>
</div></div></main>
<script>
const topics=[['Dopamine Fasting','"Stop doing this before 10am"','TikTok','9.1'],['AI Focus Protocol','"I replaced coffee with this"','Instagram','8.7'],['Deep Work Stack','"What top founders hide"','YouTube','8.9']];
const hooks=['If you are still ___, you are losing...','3 mistakes killing your ___','Do this for 7 days and watch ___'];
const rows=document.getElementById('topicRows');
rows.innerHTML=topics.map((t,i)=>`<tr><td>${t[0]}</td><td>${t[1]}</td><td>${t[2]}</td><td>${t[3]}</td><td><button class="addIdea" data-topic="${t[0]}">→ Add To Ideas</button> <button>→ Script</button></td></tr>`).join('');
document.getElementById('hookLib').innerHTML=hooks.map(h=>`<div class="bank">${h}<br><button class="copy" data-t="${h}">Copy</button></div>`).join('');
function renderBank(){const bank=JSON.parse(localStorage.getItem('ctrl_research_bank')||'[]');document.getElementById('ideaBank').innerHTML=bank.map(x=>`<div>${x}</div>`).join('')||'<i>No ideas yet</i>';}
renderBank();
document.getElementById('saveCapture').onclick=()=>{const v=document.getElementById('quickCapture').value.trim();if(!v)return;const bank=JSON.parse(localStorage.getItem('ctrl_research_bank')||'[]');bank.unshift(v);localStorage.setItem('ctrl_research_bank',JSON.stringify(bank));const ideas=JSON.parse(localStorage.getItem('ctrl_pipeline_ideas')||'[]');ideas.push({title:v,source:'research'});localStorage.setItem('ctrl_pipeline_ideas',JSON.stringify(ideas));document.getElementById('quickCapture').value='';renderBank();};
document.body.addEventListener('click',e=>{if(e.target.classList.contains('copy'))navigator.clipboard.writeText(e.target.dataset.t);if(e.target.classList.contains('addIdea')){const ideas=JSON.parse(localStorage.getItem('ctrl_pipeline_ideas')||'[]');ideas.push({title:e.target.dataset.topic,source:'research'});localStorage.setItem('ctrl_pipeline_ideas',JSON.stringify(ideas));e.target.textContent='Added';}});
</script></body></html>
